<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge TTS Thai Sample</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; background: #f7f7f8; color: #222; }
  h1 { font-size: 1.3rem; }
  textarea { width: 100%; height: 90px; padding: 10px; font-size: 1rem; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
  select, button { font-size: 1rem; padding: 10px 14px; border-radius: 8px; border: 1px solid #ccc; margin-top: 10px; }
  button { background: #2563eb; color: white; border: none; cursor: pointer; }
  button:disabled { background: #999; }
  #status { margin-top: 12px; font-size: 0.9rem; color: #555; min-height: 20px; }
  audio { width: 100%; margin-top: 12px; }
</style>
</head>
<body>
  <h1>🎙️ Edge TTS Thai – Sample Player</h1>
  <p>Text eingeben, Stimme wählen, abspielen.</p>

  <textarea id="text">สวัสดีครับ ยินดีต้อนรับ</textarea>

  <div>
    <select id="voice">
      <option value="th-TH-NiwatNeural">Niwat (männlich)</option>
      <option value="th-TH-PremwadeeNeural">Premwadee (weiblich, zum Vergleich)</option>
    </select>
    <button id="playBtn" onclick="speak()">▶️ Abspielen</button>
  </div>

  <div id="status"></div>
  <audio id="player" controls style="display:none"></audio>

<script>
const TRUSTED_CLIENT_TOKEN = '6A5AA1D4EAFF4E9FB37E23D68491D6F4';

async function generateSecMsGec() {
  const WIN_EPOCH = 11644473600;
  const S_TO_NS = 1e9;
  let ticks = Date.now() / 1000 + WIN_EPOCH;
  ticks -= (ticks % 300);
  ticks *= (S_TO_NS / 100);
  const strToHash = Math.floor(ticks).toString() + TRUSTED_CLIENT_TOKEN;
  const data = new TextEncoder().encode(strToHash);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
}

function uuid() {
  return crypto.randomUUID().replace(/-/g, '');
}

function escapeXml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function speak() {
  const btn = document.getElementById('playBtn');
  const status = document.getElementById('status');
  const player = document.getElementById('player');
  const text = document.getElementById('text').value.trim();
  const voice = document.getElementById('voice').value;

  if (!text) { status.textContent = 'Bitte Text eingeben.'; return; }

  btn.disabled = true;
  status.textContent = 'Verbinde mit Edge TTS...';
  player.style.display = 'none';

  try {
    const secMsGec = await generateSecMsGec();
    const connectionId = uuid();
    const wsUrl = `wss://speech.platform.bing.com/consumer/speech/synthesize/readaloud/edge/v1?TrustedClientToken=${TRUSTED_CLIENT_TOKEN}&Sec-MS-GEC=${secMsGec}&Sec-MS-GEC-Version=1-131.0.2903.51&ConnectionId=${connectionId}`;

    const ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    const audioChunks = [];
    let timeoutId = setTimeout(() => {
      status.textContent = 'Timeout - keine Antwort vom Server.';
      btn.disabled = false;
      ws.close();
    }, 15000);

    ws.onopen = () => {
      status.textContent = 'Verbunden, sende Text...';
      const now = new Date().toString();
      const configMsg = `X-Timestamp:${now}\r\nContent-Type:application/json; charset=utf-8\r\nPath:speech.config\r\n\r\n{"context":{"synthesis":{"audio":{"metadataoptions":{"sentenceBoundaryEnabled":"false","wordBoundaryEnabled":"false"},"outputFormat":"audio-24khz-48kbitrate-mono-mp3"}}}}`;
      ws.send(configMsg);

      const requestId = uuid();
      const ssml = `<speak version='1.0' xml:lang='th-TH'><voice name='${voice}'><prosody rate='0%' pitch='0%'>${escapeXml(text)}</prosody></voice></speak>`;
      const ssmlMsg = `X-RequestId:${requestId}\r\nContent-Type:application/ssml+xml\r\nX-Timestamp:${now}Z\r\nPath:ssml\r\n\r\n${ssml}`;
      ws.send(ssmlMsg);
    };

    ws.onmessage = (event) => {
      if (typeof event.data === 'string') {
        if (event.data.includes('Path:turn.end')) {
          clearTimeout(timeoutId);
          const blob = new Blob(audioChunks, { type: 'audio/mpeg' });
          const url = URL.createObjectURL(blob);
          player.src = url;
          player.style.display = 'block';
          player.play();
          status.textContent = audioChunks.length ? 'Fertig ✅' : 'Keine Audiodaten erhalten ⚠️';
          btn.disabled = false;
          ws.close();
        }
      } else {
        const dv = new DataView(event.data);
        const headerLength = dv.getUint16(0, false);
        const headerBytes = new Uint8Array(event.data, 2, headerLength);
        const header = new TextDecoder().decode(headerBytes);
        if (header.includes('Path:audio')) {
          const audioData = event.data.slice(2 + headerLength);
          audioChunks.push(audioData);
        }
      }
    };

    ws.onerror = (e) => {
      clearTimeout(timeoutId);
      status.textContent = 'Verbindungsfehler ❌ (siehe Konsole)';
      console.error(e);
      btn.disabled = false;
    };

    ws.onclose = () => {
      clearTimeout(timeoutId);
      btn.disabled = false;
    };

  } catch (err) {
    status.textContent = 'Fehler: ' + err.message;
    console.error(err);
    btn.disabled = false;
  }
}
</script>
</body>
</html>
